<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <script src="https://kit.fontawesome.com/f1f723bf20.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="Images/LOGO.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#f39d2d" />
    <title>KIMI</title>


    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            background:url("Images/BG.png") no-repeat center center fixed;
            background-size:cover;
            display:flex;
            flex-direction:column;
        }

        nav {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-wrapper a {
            color: white !important;
        }
        .brand-logo {
            cursor: default !important; 
            user-select: none;  
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            display: flex !important;
            align-items: center !important;
            height: 100%;
            padding: 0 10px; /* optional, adjust spacing */
        }
        .brand-logo img {
            height: 40px; /* keeps your logo size */
            margin-right: 10px;
        }
        .navbar-kimi {
            margin-top: 9px;
            font-family: 'Roboto', sans-serif; 
            font-weight: 700; 
            font-size: 28px; 
            color: #fff;
        }

        main{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        
        .login-card {
            backdrop-filter:blur(12px);
            background:rgba(255, 255, 255, 0.01);
            border-radius:20px;
            padding:40px;
            width:350px;
            height:500px;
            border:1px solid rgba(255,255,255,0.3);
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            display:flex;
            flex-direction:column;
            align-items: stretch; 
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }

        .login-title {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        .usercon,.passcon{
            position:relative;
            width:100%;
            margin:10px 0;
        }

        .usernamefield, .passwordfield {
            width: 100%;
            padding:1px 1px !important;
            font-size: 14px;
            border-radius: 20px !important;
            background: white !important;
            box-sizing: border-box;
        }
        .usernamefield:focus, .usernamefield:focus:invalid, .passwordfield:focus, .passwordfield:focus:invalid {
            outline: none !important;
            border: 2px solid #f39d2d !important;
            box-shadow: 0 0 5px rgba(210, 180, 140, 0.5) !important;
        }

        .usernamefield, 
        .passwordfield {
            color: black !important;
        }

        .usernamefield::placeholder,
        .passwordfield::placeholder {
            color: #848383 !important;
        }

        .btnlogin:focus {
            outline: none !important;
            border: 2px solid #f39d2d !important;
            box-shadow: 0 0 5px rgba(210, 180, 140, 0.5) !important;
        }
        .login-title {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .toggle-btn{
            position:absolute;
            top:40%;
            right:15px;
            transform:translateY(-50%);
            background:none;
            border:none;
            cursor:pointer;
            font-size:16px;
            color:#555;
        }

        .btnlogin{
            border:1px solid #ffffff;
            border-radius:25px;
            background-color:transparent;
            color:#ffffff;
            padding:10px 30px;
            font-size:16px;
            cursor:pointer;
            transition:all 0.3s ease;
            margin-top:15px;
        }

        .btnlogin:hover{
            background-color:white;
            color:black;
        }
        .cursive-text {
            font-family: 'Dancing Script', cursive !important;
            font-weight: 50px;
            font-size: 28px;    
            color: #fff;    
        }

        @media only screen and (max-width: 600px) {
            .login-card form {
                display: flex !important;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <div class="navbar-fixed">
        <nav>
            <div class="container nav-wrapper">
                <a href="#!" class="brand-logo" style="display: flex; align-items: center; height: 55px;"> 
                    <img src="Images/LOGO.png" alt="Logo" class="hide-on-large-only">
                    <span class="hide-on-med-and-down navbar-kimi">KIMI</span>
                </a>
                <ul class="right hide-on-med-and-down">
                    <li><a href="">About Us</a></li>
                </ul>
            </div>
        </nav>
    </div>
    
     <main style="flex:1; display:flex;">
        <div class="row" style="flex:1; margin:0; display:flex; width:100%;">
            <div class="col s12 m6 hide-on-med-and-down" style="height:100%;"></div>

            <div class="col s12 m6" style="display:flex; align-items:center; justify-content:center; height:100%;">
                <div class="login-card">
                    <div class="logo-container">
                        <img src="Images/LOGO.png" alt="KIMI Logo" class="logo">
                        <h5 class="login-title">
                            <span class="cursive-text">Welcome to, </span> KIMI
                        </h5>
                    </div>

                    <form action="" method="POST">
                        <div class="usercon">
                            <input type="text" name="username" id="username" class="usernamefield" placeholder="Username" required>
                        </div>

                        <div class="passcon">
                            <input type="password" name="password" id="password" class="passwordfield" placeholder="Password" required>
                            <button type="button" class="toggle-btn" onclick="togglePassword()">
                                <i id="toggleIcon" class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <button type="button" class="btnlogin" onclick="location.href='main.html'">LOG IN</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(){
            const password=document.getElementById("password");
            const icon=document.getElementById("toggleIcon");

            if(password.type==="password"){
                password.type="text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }else{
                password.type="password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker registration failed', err));
    });
  }

  // Optional: PWA install prompt handling
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.createElement('button');
    btn.textContent = 'Install KIMI';
    btn.className = 'btnlogin';
    document.body.appendChild(btn);
    btn.addEventListener('click', async () => {
      btn.style.display = 'none';
      deferredPrompt.prompt();
      const choiceResult = await deferredPrompt.userChoice;
      console.log(choiceResult.outcome);
      deferredPrompt = null;
    });
  });
</script>
</body>
</html>
